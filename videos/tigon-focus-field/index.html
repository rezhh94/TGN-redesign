<!DOCTYPE html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>Tigon Focus Field</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        margin: 0;
        overflow: hidden;
        background: #070707;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      .clip,
      .focus-field-canvas,
      .focus-field-depth {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .focus-field-canvas {
        overflow: hidden;
        background: #070707;
        isolation: isolate;
      }

      .focus-field-depth {
        z-index: 1;
        background:
          radial-gradient(ellipse 72% 96% at 46% 46%, rgba(23, 26, 25, 0.42), transparent 72%),
          radial-gradient(ellipse 48% 62% at 84% 18%, rgba(13, 15, 15, 0.72), transparent 78%);
      }

      .field,
      .aperture,
      .selection-cut,
      .shadow-pocket {
        position: absolute;
        transform-origin: 50% 50%;
        will-change: transform, opacity;
      }

      .field {
        z-index: 2;
        mix-blend-mode: screen;
      }

      .field--primary {
        top: 78px;
        left: -210px;
        width: 1240px;
        height: 890px;
        border-radius: 50%;
        background: radial-gradient(
          ellipse 56% 58% at 43% 52%,
          rgba(232, 237, 234, 1) 0%,
          rgba(174, 190, 184, 0.82) 23%,
          rgba(91, 119, 109, 0.38) 48%,
          transparent 74%
        );
        filter: blur(54px);
      }

      .field--secondary {
        top: -180px;
        right: -330px;
        width: 1180px;
        height: 760px;
        border-radius: 48%;
        background: radial-gradient(
          ellipse 62% 54% at 50% 50%,
          rgba(153, 177, 168, 0.82) 0%,
          rgba(82, 117, 104, 0.48) 34%,
          rgba(36, 58, 50, 0.22) 56%,
          transparent 76%
        );
        filter: blur(72px);
      }

      .field--lower {
        right: 120px;
        bottom: -350px;
        width: 1120px;
        height: 720px;
        border-radius: 50%;
        background: radial-gradient(
          ellipse 60% 50% at 54% 45%,
          rgba(129, 151, 143, 0.54) 0%,
          rgba(61, 88, 78, 0.3) 38%,
          transparent 74%
        );
        filter: blur(86px);
      }

      .field--counter {
        top: 200px;
        left: 610px;
        width: 620px;
        height: 700px;
        border-radius: 46%;
        background: radial-gradient(
          ellipse 34% 70% at 52% 48%,
          rgba(159, 178, 171, 0.4),
          rgba(78, 107, 96, 0.18) 52%,
          transparent 76%
        );
        filter: blur(64px);
      }

      .aperture {
        z-index: 3;
        top: 70px;
        left: 590px;
        width: 610px;
        height: 920px;
        border-radius: 44%;
        background: radial-gradient(
          ellipse 36% 74% at 48% 50%,
          rgba(233, 237, 235, 0.78) 0%,
          rgba(166, 184, 177, 0.42) 30%,
          rgba(79, 106, 96, 0.17) 56%,
          transparent 74%
        );
        filter: blur(24px);
        mix-blend-mode: screen;
      }

      .selection-cut {
        z-index: 4;
        top: -140px;
        left: 895px;
        width: 150px;
        height: 1360px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(179, 196, 189, 0.06) 24%,
          rgba(230, 234, 232, 0.4) 50%,
          rgba(113, 139, 129, 0.08) 76%,
          transparent
        );
        filter: blur(18px);
        mix-blend-mode: screen;
      }

      .shadow-pocket {
        z-index: 5;
        background: #030303;
        filter: blur(74px);
        mix-blend-mode: multiply;
      }

      .shadow-pocket--left {
        top: -210px;
        left: -270px;
        width: 900px;
        height: 610px;
        border-radius: 50%;
      }

      .shadow-pocket--right {
        right: -270px;
        bottom: -200px;
        width: 980px;
        height: 680px;
        border-radius: 48%;
      }

    </style>
  </head>
  <body>
    <div data-hf-id="hf-199x" id="root" data-composition-id="main" data-start="0" data-duration="10" data-width="1920" data-height="1080">
      <section data-hf-id="hf-v336" id="focus-field-scene" class="clip" data-start="0" data-duration="10" data-track-index="1">
        <div data-hf-id="hf-lcw1" class="focus-field-canvas" data-layout-allow-overflow="" data-layout-allow-overlap="">
          <div data-hf-id="hf-6zf7" class="focus-field-depth"></div>
          <div data-hf-id="hf-hjgf" id="field-primary" class="field field--primary"></div>
          <div data-hf-id="hf-ggr3" id="field-secondary" class="field field--secondary"></div>
          <div data-hf-id="hf-p4md" id="field-lower" class="field field--lower"></div>
          <div data-hf-id="hf-wz33" id="field-counter" class="field field--counter"></div>
          <div data-hf-id="hf-l59z" id="focus-aperture" class="aperture"></div>
          <div data-hf-id="hf-4gds" id="selection-cut" class="selection-cut"></div>
          <div data-hf-id="hf-d8yb" id="shadow-left" class="shadow-pocket shadow-pocket--left"></div>
          <div data-hf-id="hf-4g6j" id="shadow-right" class="shadow-pocket shadow-pocket--right"></div>
        </div>
      </section>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      const motions = [
        {
          target: "#field-primary",
          start: { x: -150, y: 44, scale: 0.92, rotation: -3.5, opacity: 0.62 },
          focus: { x: 74, y: -18, scale: 1.06, rotation: -0.6, opacity: 0.96 },
        },
        {
          target: "#field-secondary",
          start: { x: 210, y: -92, scale: 0.9, rotation: 4.2, opacity: 0.38 },
          focus: { x: -96, y: 42, scale: 1.08, rotation: -1.2, opacity: 0.7 },
        },
        {
          target: "#field-lower",
          start: { x: 108, y: 142, scale: 0.94, rotation: 2.8, opacity: 0.32 },
          focus: { x: -62, y: -34, scale: 1.1, rotation: 0.4, opacity: 0.58 },
        },
        {
          target: "#field-counter",
          start: { x: -84, y: 18, scale: 0.86, rotation: -4, opacity: 0.14 },
          focus: { x: 28, y: -12, scale: 1.04, rotation: -1.4, opacity: 0.42 },
        },
        {
          target: "#focus-aperture",
          start: { x: -156, y: 28, scale: 0.82, rotation: -8.5, opacity: 0.09 },
          focus: { x: 34, y: -8, scale: 1.04, rotation: -3.2, opacity: 0.68 },
        },
        {
          target: "#selection-cut",
          start: { x: -190, y: 0, scale: 0.92, rotation: -13, opacity: 0.03 },
          focus: { x: 10, y: 0, scale: 1.04, rotation: -8, opacity: 0.34 },
        },
        {
          target: "#shadow-left",
          start: { x: -70, y: -52, scale: 1.02, rotation: 0, opacity: 0.84 },
          focus: { x: 42, y: 28, scale: 0.9, rotation: 0, opacity: 0.64 },
        },
        {
          target: "#shadow-right",
          start: { x: 92, y: 72, scale: 1.02, rotation: 0, opacity: 0.9 },
          focus: { x: -48, y: -32, scale: 0.92, rotation: 0, opacity: 0.7 },
        },
      ];

      motions.forEach(({ target, start, focus }) => {
        tl.fromTo(
          target,
          start,
          { ...focus, duration: 5, ease: "sine.inOut" },
          0,
        );
        tl.to(
          target,
          { ...start, duration: 5, ease: "sine.inOut" },
          5,
        );
      });

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
